<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="50%" stop-color="#2d1810"/>
      <stop offset="100%" stop-color="#0d0500"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="piece3d" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFF5E6"/>
      <stop offset="60%" stop-color="#E8D0A8"/>
      <stop offset="100%" stop-color="#A08060"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FF2020" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines (faint chess board) -->
  <g opacity="0.08" stroke="#D4A76A" stroke-width="1">
    <line x1="80" y1="100" x2="80" y2="530"/>
    <line x1="160" y1="100" x2="160" y2="530"/>
    <line x1="240" y1="100" x2="240" y2="530"/>
    <line x1="320" y1="100" x2="320" y2="530"/>
    <line x1="80" y1="100" x2="320" y2="100"/>
    <line x1="80" y1="210" x2="320" y2="210"/>
    <line x1="80" y1="320" x2="320" y2="320"/>
    <line x1="80" y1="430" x2="320" y2="430"/>
    <line x1="80" y1="530" x2="320" y2="530"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- 3D Chess piece - large decorative -->
  <g transform="translate(200, 315)" filter="url(#shadow)">
    <ellipse cx="0" cy="8" rx="65" ry="55" fill="#3D2010" opacity="0.5"/>
    <circle cx="0" cy="0" r="65" fill="url(#piece3d)" stroke="#6B3A1F" stroke-width="3"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#B30000" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="18" text-anchor="middle" fill="#B30000" font-size="55" font-weight="bold" font-family="KaiTi, STKaiti, serif">帥</text>
  </g>

  <!-- Particles burst -->
  <g opacity="0.7">
    <circle cx="310" cy="250" r="4" fill="#EF4444"/>
    <circle cx="330" cy="230" r="3" fill="#F97316"/>
    <circle cx="290" cy="220" r="5" fill="#FBBF24"/>
    <circle cx="340" cy="270" r="3" fill="#DC2626"/>
    <circle cx="275" cy="260" r="4" fill="#F59E0B"/>
    <circle cx="320" cy="210" r="3" fill="#FF6B6B"/>
    <circle cx="260" cy="240" r="4" fill="#EF4444"/>
    <circle cx="350" cy="240" r="3" fill="#FBBF24"/>
  </g>

  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" fill="#F5E6CC" font-size="48" font-weight="bold" font-family="KaiTi, STKaiti, serif" letter-spacing="4">
    中国象棋 AI
  </text>

  <!-- Subtitle -->
  <text x="600" y="260" text-anchor="middle" fill="#D4A76A" font-size="28" font-family="sans-serif" letter-spacing="2">
    一次性解决三大顽疾
  </text>

  <!-- Announcement demo -->
  <g filter="url(#textGlow)">
    <text x="600" y="360" text-anchor="middle" fill="#FF2020" font-size="72" font-weight="bold" font-family="KaiTi, STKaiti, serif" letter-spacing="20">
      绝 杀
    </text>
  </g>

  <!-- Decorative lines -->
  <line x1="420" y1="310" x2="520" y2="310" stroke="#FF2020" stroke-width="2" opacity="0.5"/>
  <line x1="680" y1="310" x2="780" y2="310" stroke="#FF2020" stroke-width="2" opacity="0.5"/>
  <line x1="420" y1="385" x2="520" y2="385" stroke="#FF2020" stroke-width="2" opacity="0.5"/>
  <line x1="680" y1="385" x2="780" y2="385" stroke="#FF2020" stroke-width="2" opacity="0.5"/>

  <!-- Tags -->
  <g font-size="16" font-family="sans-serif">
    <rect x="380" y="430" width="80" height="30" rx="15" fill="#B30000" opacity="0.8"/>
    <text x="420" y="450" text-anchor="middle" fill="white">3D 棋子</text>

    <rect x="480" y="430" width="100" height="30" rx="15" fill="#B30000" opacity="0.8"/>
    <text x="530" y="450" text-anchor="middle" fill="white">动画特效</text>

    <rect x="600" y="430" width="100" height="30" rx="15" fill="#B30000" opacity="0.8"/>
    <text x="650" y="450" text-anchor="middle" fill="white">Bug 修复</text>

    <rect x="720" y="430" width="100" height="30" rx="15" fill="#B30000" opacity="0.8"/>
    <text x="770" y="450" text-anchor="middle" fill="white">纯 SVG</text>
  </g>

  <!-- Bottom info -->
  <text x="600" y="560" text-anchor="middle" fill="#8B7355" font-size="18" font-family="sans-serif">
    3 个 Bug 修复 · 6 种动画效果 · 0 外部依赖 · 纯 SVG + Web Audio API
  </text>
  <text x="600" y="590" text-anchor="middle" fill="#6B5B45" font-size="14" font-family="sans-serif">
    LingQ Blog · 2026-03-25
  </text>
</svg>
